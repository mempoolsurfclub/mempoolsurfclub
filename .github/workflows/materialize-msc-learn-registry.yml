name: Materialize MSC Learn Registry

on:
  push:
    branches:
      - docs/learn-registry-source
    paths:
      - ".github/workflows/materialize-msc-learn-registry.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out registry branch
        uses: actions/checkout@v4
        with:
          ref: docs/learn-registry-source
          fetch-depth: 0

      - name: Decode and verify final registry files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import bz2
          import gzip
          import hashlib

          root = Path('.')
          payload = root / '.github' / 'msc-learn-payload'
          outputs = [
              ('json', root / 'docs' / 'learn' / 'MSC_Learn_Master_Registry.json', 'gzip', 'c5ca644d9f4f4fda3a887cfb1106b1d6472f190509cb7865c627b34ff6dde531'),
              ('md', root / 'docs' / 'learn' / 'MSC_Learn_Master_Registry.md', 'bz2', '84049ef0414ab84d89e8e5f9e3489436007d61e7d23fd691152af54ea5f55162'),
              ('validation', root / 'docs' / 'learn' / 'MSC_Learn_Registry_Validation.txt', 'gzip', 'de9ec5ef6f4d98a7bc209a690ea8ec64ac4e3c940d31b187cee86c3f059ccd4c'),
          ]

          for folder, destination, compression, expected in outputs:
              parts = sorted((payload / folder).glob('part-*'))
              if not parts:
                  raise SystemExit(f'No payload chunks found for {folder}')
              encoded = ''.join(part.read_text(encoding='ascii').strip() for part in parts)
              packed = base64.b64decode(encoded)
              raw = gzip.decompress(packed) if compression == 'gzip' else bz2.decompress(packed)
              actual = hashlib.sha256(raw).hexdigest()
              if actual != expected:
                  raise SystemExit(f'SHA mismatch for {destination}: {actual}')
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(raw)
              print(f'Wrote {destination} ({len(raw)} bytes)')

          print('All final registry files materialized and verified.')
          PY

      - name: Remove temporary payload
        run: rm -rf .github/msc-learn-payload

      - name: Commit final registry source files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add final MSC Learn registry source files"
          git push origin HEAD:docs/learn-registry-source
