name: Temporary Guide 013 precision corrections

on:
  push:
    branches:
      - content/learn-essentials-013-016

permissions:
  contents: write

jobs:
  correct-guide-013:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/learn-essentials-013-016
          fetch-depth: 0
      - name: Apply exact approved replacements
        shell: python
        run: |
          from pathlib import Path

          path = Path('docs/learn/content/guides/MSC-GUIDE-013-bitcoin-utxos.md')
          text = path.read_text()

          old1 = "An output can remain unspent for a short time or many years. Its status changes only when a valid transaction spending that exact output becomes part of the selected chain state."
          new1 = "An output can remain unspent for a short time or many years. While the transaction that created it remains in the active chain, the output stays unspent until a valid transaction spending it enters that chain. A chain reorganization can also remove the creating transaction or undo a later spend, changing the output's active-chain status."

          old2 = "Nodes use the reference to find the previous output in the UTXO set, examine its value and locking condition, and verify that the new transaction satisfies the applicable rules."
          new2 = "During block validation, a node uses the reference to find the previous output in the applicable coins view. During mempool validation, that view can also account for accepted unconfirmed ancestors. The node examines the output's value and locking condition and verifies that the new transaction satisfies the applicable rules."

          if text.count(old1) != 1:
              raise RuntimeError(f'First target count was {text.count(old1)}, expected 1')
          if text.count(old2) != 1:
              raise RuntimeError(f'Second target count was {text.count(old2)}, expected 1')

          protected = [
              'The change is a newly created transaction output.',
              "Bitcoin Core defines coinbase maturity as 100 blocks. A coinbase output can be spent only in a block whose height is at least 100 greater than the height of the block that created it. A reorganization can change active-chain depth, so wallet maturity status can change with the selected chain view.",
              'status: COPY_LOCKED',
              'reviewed_date: 2026-07-17',
              'copy_locked_date: 2026-07-17',
              'author_display: Mempool Surf Club Editorial',
              '- Reviewer: Mempool Surf Club Editorial',
              '- Review date: 2026-07-17',
          ]
          for item in protected:
              if item not in text:
                  raise RuntimeError(f'Missing protected content: {item}')

          updated = text.replace(old1, new1, 1).replace(old2, new2, 1)
          if updated == text:
              raise RuntimeError('No changes applied')
          path.write_text(updated)

          workflow = Path('.github/workflows/temp-correct-guide-013.yml')
          workflow.unlink()
      - name: Validate and commit
        run: |
          git diff --check
          git status --short
          test "$(git diff --name-only | sort)" = $'.github/workflows/temp-correct-guide-013.yml\ndocs/learn/content/guides/MSC-GUIDE-013-bitcoin-utxos.md'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/learn/content/guides/MSC-GUIDE-013-bitcoin-utxos.md .github/workflows/temp-correct-guide-013.yml
          git commit -m "Apply final Guide 013 precision corrections"
          git push origin HEAD:content/learn-essentials-013-016
