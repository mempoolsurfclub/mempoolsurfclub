name: Materialize Development Guides

on:
  push:
    branches:
      - content/learn-development-041-044

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and validate editorial bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/msc-development-guides.b64
          for sha in \
            1ad9627dae2d30bab3250b66ca93d990dc2e4b85 \
            dda984c618ff5192ccc5ba0617e6250f1e16958b \
            bb179e56cb4cb13d1cf984a7a186746076d65697 \
            369606bf5f0d124786d634166bc2b2778c4eb7f7 \
            8fab4f9b1a8b8f2d07850bba7a3920574dfdc11c
          do
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" \
              | python3 -c 'import base64,json,sys; sys.stdout.write(base64.b64decode(json.load(sys.stdin)["content"]).decode("ascii"))' \
              >> /tmp/msc-development-guides.b64
          done

          base64 --decode /tmp/msc-development-guides.b64 > /tmp/msc-development-guides.tar.bz2
          echo "a4644dc23b0667c83f7e04b3a67c57140f5f5a03a625c4b5d2807fc6341655f7  /tmp/msc-development-guides.tar.bz2" | sha256sum --check --strict
          tar -xjf /tmp/msc-development-guides.tar.bz2 -C "${GITHUB_WORKSPACE}"
          rm -f .github/workflows/materialize-development-guides.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/learn/content/content-manifest.json \
            docs/learn/content/guides/MSC-GUIDE-041-bitcoin-developer-tools.md \
            docs/learn/content/guides/MSC-GUIDE-042-bitcoin-wallet-integrations.md \
            docs/learn/content/guides/MSC-GUIDE-043-bitcoin-apis.md \
            docs/learn/content/guides/MSC-GUIDE-044-bitcoin-indexers.md \
            .github/workflows/materialize-development-guides.yml

          test "$(git diff --cached --name-only | wc -l)" -eq 6
          git commit -m "Draft Development guides 041 through 044"
          git push origin "HEAD:${GITHUB_REF_NAME}"
