name: Temporary Essentials copy lock

on:
  push:
    branches:
      - content/learn-essentials-013-016

permissions:
  contents: write

jobs:
  lock-essentials:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/learn-essentials-013-016
          fetch-depth: 0
      - name: Apply approved copy lock
        shell: python
        run: |
          from pathlib import Path
          import json

          root = Path('.')
          guides = {
              'docs/learn/content/guides/MSC-GUIDE-013-bitcoin-utxos.md': '''## 11. Human verification

          - Reviewer: Mempool Surf Club Editorial
          - Review date: 2026-07-17
          - Notes:
            - Editorial accuracy review completed.
            - Recheck source URL accessibility immediately before publication.
            - Confirm Bitcoin Core UTXO, validation, coinbase-maturity, dust, relay-policy, and wallet-policy terminology remains current before publication.
            - Keep planned internal links inactive until real destination pages and confirmed URLs exist.

          ''',
              'docs/learn/content/guides/MSC-GUIDE-014-bitcoin-confirmations.md': '''## 11. Human verification

          - Reviewer: Mempool Surf Club Editorial
          - Review date: 2026-07-17
          - Notes:
            - Editorial accuracy review completed.
            - Recheck source URL accessibility immediately before publication.
            - Recheck current Bitcoin Core chain-selection, confirmation, reorganization, mempool, and replacement-policy behavior before publication.
            - Keep planned internal links inactive until real destination pages and confirmed URLs exist.

          ''',
              'docs/learn/content/guides/MSC-GUIDE-015-bitcoin-halving.md': '''## 11. Human verification

          - Reviewer: Mempool Surf Club Editorial
          - Review date: 2026-07-17
          - Notes:
            - Editorial accuracy review completed.
            - Recheck source URL accessibility immediately before publication.
            - Confirm Bitcoin Core subsidy implementation, mainnet 210,000-block interval, total-issuance wording, and difficulty-adjustment terminology remains current before publication.
            - Keep planned internal links inactive until real destination pages and confirmed URLs exist.

          ''',
              'docs/learn/content/guides/MSC-GUIDE-016-bitcoin-best-practices.md': '''## 11. Human verification

          - Reviewer: Mempool Surf Club Editorial
          - Review date: 2026-07-17
          - Notes:
            - Editorial accuracy and practical-safety review completed.
            - Recheck source URL accessibility immediately before publication.
            - Recheck current software-verification, transaction-relay, confirmation, wallet-security, recovery, and privacy-tool terminology and implementation behavior before publication.
            - Keep planned internal links inactive until real destination pages and confirmed URLs exist.

          ''',
          }

          for rel, human_verification in guides.items():
              path = root / rel
              text = path.read_text()
              text = text.replace('status: EDITORIAL_REVIEW', 'status: COPY_LOCKED', 1)
              text = text.replace('reviewed_date: null', 'reviewed_date: 2026-07-17', 1)
              text = text.replace('copy_locked_date: null', 'copy_locked_date: 2026-07-17', 1)
              if 'MSC-GUIDE-013' in rel:
                  text = text.replace(
                      'The change is newly created transaction output. It is not an untouched remainder still sitting inside the original output.',
                      'The change is a newly created transaction output. It is not an untouched remainder still sitting inside the original output.',
                  )
                  text = text.replace(
                      'Outputs created by a coinbase transaction cannot be spent until the consensus maturity requirement is satisfied. Bitcoin Core defines this maturity as 100 blocks, with validation rules determining when the spend becomes eligible.',
                      'Bitcoin Core defines coinbase maturity as 100 blocks. A coinbase output can be spent only in a block whose height is at least 100 greater than the height of the block that created it. A reorganization can change active-chain depth, so wallet maturity status can change with the selected chain view.',
                  )
              start = text.index('## 11. Human verification')
              end = text.index('## 12. Illustration brief', start)
              text = text[:start] + human_verification + text[end:]
              path.write_text(text)

          manifest_path = root / 'docs/learn/content/content-manifest.json'
          manifest = json.loads(manifest_path.read_text())
          target_ids = {'MSC-GUIDE-013', 'MSC-GUIDE-014', 'MSC-GUIDE-015', 'MSC-GUIDE-016'}
          changed = []
          for entry in manifest['entries']:
              if entry.get('registry_id') in target_ids:
                  if entry.get('status') != 'EDITORIAL_REVIEW':
                      raise RuntimeError(f"Unexpected manifest status for {entry['registry_id']}: {entry.get('status')}")
                  entry['status'] = 'COPY_LOCKED'
                  changed.append(entry['registry_id'])
          if set(changed) != target_ids:
              raise RuntimeError(f'Manifest target mismatch: {changed}')
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n')

          workflow = root / '.github/workflows/temp-lock-essentials.yml'
          workflow.unlink()
      - name: Commit final five-file update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/learn/content/content-manifest.json \
            docs/learn/content/guides/MSC-GUIDE-013-bitcoin-utxos.md \
            docs/learn/content/guides/MSC-GUIDE-014-bitcoin-confirmations.md \
            docs/learn/content/guides/MSC-GUIDE-015-bitcoin-halving.md \
            docs/learn/content/guides/MSC-GUIDE-016-bitcoin-best-practices.md \
            .github/workflows/temp-lock-essentials.yml
          git commit -m "Lock Essentials guides MSC-GUIDE-013 through MSC-GUIDE-016"
          git push origin HEAD:content/learn-essentials-013-016
